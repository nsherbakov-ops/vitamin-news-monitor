name: Vitamin awards weekly digest

on:
  # Weekly digest — exact timing does not matter, so GitHub's native schedule is
  # fine here (unlike the hourly news monitor, which needs an external pinger).
  # Mondays 06:23 UTC = 09:23 MSK. Scheduled workflows run only on the default branch.
  schedule:
    - cron: '23 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: vitamin-awards-weekly
  cancel-in-progress: false

jobs:
  awards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run awards monitor
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "Read the file AWARDS.md in the repository root and follow its instructions exactly."
          claude_args: '--allowedTools "WebFetch,Read,Bash(curl:*)"'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
