name: Vitamin news monitor

on:
  # Scheduling is handled by an EXTERNAL pinger (cron-job.org) that calls the
  # workflow_dispatch REST API at exact MSK times. GitHub's own `schedule:` cron
  # was removed: it dropped/delayed slots by hours (10:00 digest never fired; the
  # 20:00 test fired at 23:32 MSK). The external pinger is now the sole trigger.
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

concurrency:
  group: vitamin-news-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run news monitor
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
